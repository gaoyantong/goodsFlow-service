server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/goods_flow?serverTimezone=Asia/Shanghai&characterEncoding=utf-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_0900_ai_ci

mybatis-plus.configuration.map-underscore-to-camel-case=false
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Flyway 8 from Spring Boot 2.7 does not recognize the local MySQL 9.2 server.
# Keep the migration scripts in the project and initialize the local schema with database/init_goods_flow.sql.
spring.flyway.enabled=false
spring.flyway.clean-disabled=true
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=false
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholder-replacement=false
